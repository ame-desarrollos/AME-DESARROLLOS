<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AME Desarrollos</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>

/* ============ VARIABLES ============ */
:root {
  --bg: #000000; /* NEGRO PURO */
  --surface: #0a0a0f;
  --card: #111118;
  --border: #1a1a28;

  --accent: #00ff88; /* VERDE PRINCIPAL */
  --accent2: #00e5a0;

  --muted: #4a4a6a;
  --text: #e8e8f0;
  --text-dim: #9090b0;

  --font-head: 'Syne', sans-serif;
  --font-mono: 'DM Mono', monospace;
  --font-body: 'DM Sans', sans-serif;
}

/* ============ RESET ============ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  line-height: 1.6;
}

/* ========= NAV ========= */
nav {
  background: rgba(0,0,0,0.9);
  border-bottom: 1px solid var(--border);
  padding: 1rem 2rem;
}

.nav-logo {
  color: var(--accent);
  font-weight: 800;
}

/* ========= HERO ========= */
.hero {
  background: radial-gradient(circle at 70% 30%, rgba(0,255,136,0.08), transparent 60%);
  min-height: 100vh;
  display: flex;
  align-items: center;
  padding: 6rem 2rem;
}

h1 span {
  color: var(--accent);
}

/* ========= BOTONES ========= */
.btn-primary {
  background: var(--accent);
  color: #000;
  border: 2px solid var(--accent);
}

.btn-primary:hover {
  background: transparent;
  color: var(--accent);
}

/* ========= STAT BAR ========= */
.stat-bar {
  background: #050507;
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
}

.stat-number {
  color: var(--accent);
}

/* ========= SECCIONES ========= */
#skills,
#servicios,
footer {
  background: #050507;
}

/* ========= LINKS ========= */
a:hover {
  color: var(--accent);
}

/* ========= FORM ========= */
.form-group input:focus,
.form-group textarea:focus {
  border-color: var(--accent);
}

.btn-send {
  background: var(--accent);
  color: #000;
}

</style>
</head>

<body>

<nav>
  <div class="nav-logo">AME Desarrollos</div>
</nav>

<section class="hero">
  <div>
    <h1>
      Automatizo tu negocio con <span>IA</span>
    </h1>
    <p>Consultor de automatización</p>
  </div>
</section>

<div class="stat-bar">
  <div class="stat-number">IA</div>
</div>

<section id="skills">
  <h2>Skills</h2>
</section>

<section id="servicios">
  <h2>Servicios</h2>
</section>

<footer>
  <div>AME Desarrollos</div>
</footer>

</body>
</html>

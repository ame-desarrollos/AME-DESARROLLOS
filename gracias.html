<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gracias – AME Desarrollos</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --border: #1e1e2e;
    --accent: #00e5a0;
    --text: #e8e8f0;
    --text-dim: #9090b0;
    --font-head: 'Syne', sans-serif;
    --font-mono: 'DM Mono', monospace;
    --font-body: 'DM Sans', sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 2rem;
    position: relative;
    overflow: hidden;
  }
  .grid-bg {
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,160,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,160,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
  }
  .glow {
    position: fixed;
    top: 30%; left: 50%;
    transform: translate(-50%, -50%);
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(0,229,160,0.07) 0%, transparent 70%);
    pointer-events: none;
  }
  .card {
    background: #111118;
    border: 1px solid var(--border);
    border-top: 3px solid var(--accent);
    padding: 3rem 3.5rem;
    max-width: 480px;
    position: relative;
    z-index: 1;
    animation: fadeUp 0.6s ease forwards;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .check {
    font-size: 2.8rem;
    margin-bottom: 1.2rem;
    display: block;
  }
  .tag {
    font-family: var(--font-mono);
    font-size: 0.7rem;
    color: var(--accent);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 1rem;
  }
  h1 {
    font-family: 'Syne', sans-serif;
    font-size: 2rem;
    font-weight: 800;
    letter-spacing: -0.04em;
    margin-bottom: 0.8rem;
    line-height: 1.1;
  }
  h1 span { color: var(--accent); }
  p {
    color: var(--text-dim);
    font-size: 0.95rem;
    line-height: 1.7;
    margin-bottom: 2rem;
  }
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    background: var(--accent);
    color: #000;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.88rem;
    padding: 0.85rem 2rem;
    text-decoration: none;
    letter-spacing: 0.02em;
    transition: opacity 0.2s;
  }
  .btn:hover { opacity: 0.85; }
  .brand {
    margin-top: 2.5rem;
    font-family: var(--font-mono);
    font-size: 0.68rem;
    color: #2a2a3a;
    letter-spacing: 0.1em;
  }
</style>
</head>
<body>
  <div class="grid-bg"></div>
  <div class="glow"></div>
  <div class="card">
    <span class="check">✓</span>
    <div class="tag">Mensaje recibido</div>
    <h1>¡Gracias por<br>escribirnos<span>!</span></h1>
    <p>Tu mensaje llegó correctamente. Te respondemos en menos de 24 horas con una propuesta concreta para tu proyecto.</p>
    <a class="btn" href="https://andresjarredondo12-ops.github.io/AME-DESARROLLOS/">← Volver al portfolio</a>
    <div class="brand">AME DESARROLLOS © 2025</div>
  </div>
</body>
</html>
